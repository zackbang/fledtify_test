version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fleetify_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fleetify
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetify_backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy # Tunggu database siap 100% sebelum backend menyala
    restart: always

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleetify_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  pg_data: